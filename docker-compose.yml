networks:
  tz_network:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    networks:
      - tz_network

  nginx:
    image: nginx:1.30.3-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tz_network
    depends_on:
      - backend
